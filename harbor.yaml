app: resumatch
kind: web
stack: { backend: django, frontend: none, auth: none }
substrate: shared
database: { strategy: shared-instance, engine: postgres }
environments: [staging, prod]
services:
  - { name: api,    type: web,    port: 8002 }
  - { name: worker, type: worker, kind: celery }
  - { name: beat,   type: worker, kind: celery-beat }
