name: Deploy resumatch

on:
  push:
    branches: [main, develop]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Set environment
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "DEPLOY_HOST=${{ secrets.PROD_HOST }}" >> $GITHUB_ENV
            echo "BRANCH=main" >> $GITHUB_ENV
            echo "HEALTH_URL=http://${{ secrets.PROD_HOST }}/health" >> $GITHUB_ENV
          else
            echo "DEPLOY_HOST=${{ secrets.STAGING_HOST }}" >> $GITHUB_ENV
            echo "BRANCH=develop" >> $GITHUB_ENV
            echo "HEALTH_URL=http://${{ secrets.STAGING_HOST }}/health" >> $GITHUB_ENV
          fi
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/resumatch
            git fetch origin && git checkout ${{ env.BRANCH }} && git reset --hard origin/${{ env.BRANCH }}
            docker compose -f docker-compose.prod.yml build
            docker compose -f docker-compose.prod.yml down || true
            docker compose -f docker-compose.prod.yml up -d
      - name: Health check (auto-rollback on failure)
        run: |
          sleep 20
          for i in 1 2 3 4 5; do curl -sf "${{ env.HEALTH_URL }}" && exit 0; sleep 10; done
          exit 1
